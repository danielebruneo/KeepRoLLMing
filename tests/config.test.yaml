# Test configuration for keeprollming orchestrator
# Uses simple, predictable values for testing

upstream_base_url: "http://localhost:9999/v1"

routes:
  # Quick profile - fast responses (smaller ctx_len for summary threshold testing)
  quick:
    pattern: "local/quick|quick"
    main_model: "test-quick-model"
    summary_model: "test-summary-1.5b"
    ctx_len: 2048
    max_tokens: 1024
    summary_enabled: true

  # Main profile - balanced (smaller ctx_len for summary threshold testing)
  main:
    pattern: "local/main|main"
    main_model: "test-main-model"
    summary_model: "test-summary-3b"
    ctx_len: 2048
    max_tokens: 1024
    summary_enabled: true

  # Deep profile - maximum context (smaller ctx_len for summary threshold testing)
  deep:
    pattern: "local/deep|deep"
    main_model: "test-deep-model"
    summary_model: "test-summary-7b"
    ctx_len: 4096
    max_tokens: 2048
    summary_enabled: true

  # Passthrough route for pass/* patterns
  passthrough:
    pattern: "pass/*"
    main_model: null
    summary_model: null
    ctx_len: 8192
    max_tokens: 4096
    passthrough_enabled: true
    backend_model_pattern: "${1}"

  # Catch-all for any other model names (forward as-is)
  catchall:
    pattern: "*"
    main_model: null
    summary_model: null
    ctx_len: 8192
    max_tokens: 4096
    passthrough_enabled: true
    backend_model_pattern: "${1}"

# Fallback settings (used when no route matches)
fallback:
  main_model: "test-fallback-model"
  summary_model: "test-summary-default"
  ctx_len: 8192
