[pytest]
asyncio_mode = auto
markers =
    asyncio: async test
    e2e_fake: end-to-end tests against the fake backend
    e2e_live: end-to-end tests against a real backend
    non_parallelizable: tests that cannot run in parallel due to shared resources

# Enable parallel execution and faster testing, but exclude specific tests from parallelization
addopts = --maxfail=3 -x -n auto

