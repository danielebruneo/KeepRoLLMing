# Orchestrator Configuration - 3-Level Hierarchy
# ================================================
# Priority order (highest to lowest):
#   1. Route level settings
#   2. Model-specific settings
#   3. Root-level defaults

# Level 1: Default settings - applied when not overridden
ctx_len: 8192
max_tokens: 4096
upstream_url: "http://arkai.local"
summary_enabled: true
passthrough_enabled: false

# Level 2+3 collapsed: Route configurations
routes:
  # ========== BACKENDS ==========

  arkai/lmstudio:
    is_private: true  # Not listed in /models
    upstream_url: "http://arkai.local:1234"

  arkai/lemonade:
    is_private: true  # Not listed in /models
    upstream_url: "http://arkai.local:8000/api"

  # ========== MODELS ==========

  arkai/GPU1/QWen3.5-35b-a3b:  # Runs on RTX 3090 24GB [LM Studio]
    is_private: true
    extends: arkai/lmstudio
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    ctx_len: 100000
    max_tokens: 32768
    capabilities:
      - chat
      - vision
      - tools

  arkai/CPU/QWen3.5-VL-2B:  # Runs on CPU [LM Studio]
    is_private: true
    extends: arkai/lmstudio
    main_model: "qwen3-vl-2b-thinking"
    ctx_len: 64000
    max_tokens: 8192
    capabilities:
      - chat
      - vision
      - tools
      - thinking

  arkai/GPU1+NPU/Llama-3.2-3B:  # Runs on NPU+AMD-GPU [Lemonade]
    is_private: true
    extends: arkai/lemonade
    main_model: "Llama-3.2-3B-Instruct-Hybrid"
    ctx_len: 8192
    max_tokens: 4096
    capabilities:
      - chat
      - tools

  # ========== BASE ROUTES ==========

  base/deep:
    extends: arkai/GPU1/QWen3.5-35b-a3b

  base/main:
    extends: arkai/GPU1/QWen3.5-35b-a3b

  base/quick:
    extends: arkai/CPU/QWen3.5-VL-2B

  base/alt:
    extends: arkai/GPU1+NPU/Llama-3.2-3B

  base/fallback:
    extends: base/alt

  base/summary:
    extends: base/quick


  # ========== CHAT ROUTES ==========

  chat:
    is_private: true  # Template/category marker, not a real route
    summary_enabled: true
    passthrough_enabled: false
    summary_routing: base/summary

  chat/quick:  # pattern not defined, rule name used as pattern
    extends: [chat, base/quick]

  chat/main:
    patterns: "mainchat/*|c/*"  # pattern defined, used for matching together with route name
    extends: [chat, base/main]

  chat/deep:
    extends: [chat, base/deep]

  # ========== LibreChat ROUTES ==========  
  local/quick:
    extends: [base/quick]
  local/main:
    extends: [base/main]
  local/deep:
    extends: [base/deep]

  # ========== SYSTEM ROUTES ==========

  sys/memory:
    extends: [base/alt]
    summary_enabled: false

  sys/summary:
    extends: [chat/quick]
    summary_enabled: false

  # ========== CODE ROUTES ==========

  code/junior:
    extends: [base/quick]
    summary_enabled: false

  code/senior:
    extends: [base/main]
    summary_enabled: false

  code/architect:
    extends: [base/deep]
    summary_enabled: true

