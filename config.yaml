# Orchestrator Configuration - 3-Level Hierarchy
# ================================================
# Priority order (highest to lowest):
#   1. Route level settings
#   2. Model-specific settings  
#   3. Root-level defaults

upstream_base_url: "http://arkai.local"

# Level 1: Default settings - applied when not overridden
defaults:
  ctx_len: 8192
  max_tokens: 4096
  summary_enabled: true

# Level 2: Model-specific configurations
models:
  # ArkAI models (port 1234)
  "qwen3.5-35b-a3b@q3_k_s":
    ctx_len: 128000
    max_tokens: 32768
  
  "qwen3-vl-2b-thinking":
    ctx_len: 64000
    max_tokens: 8192

  # Local models (port 8000)
  "Llama-3.2-3B-Instruct-Hybrid":
    ctx_len: 8192
    max_tokens: 4096
  
  "qwen2.5-3b-instruct":
    ctx_len: 8192
    max_tokens: 4096

# Level 3: Route configurations
routes:
  # ========== CHAT ROUTES ==========
  
  chat/quick:
    pattern: "chat/quick|c/q"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen2.5-3b-instruct"
    summary_model: "qwen3-vl-2b-thinking"
    # Inherits ctx_len=8192, max_tokens=4096 from model config

  chat/main:
    pattern: "chat/main|c/m"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    summary_model: "qwen3-vl-2b-thinking"
    # Inherits ctx_len=128000, max_tokens=32768 from model config

  chat/deep:
    pattern: "chat/deep|c/d"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    summary_model: "qwen3-vl-2b-thinking"
    # Inherits ctx_len=128000, max_tokens=32768 from model config

  # ========== SYSTEM ROUTES ==========
  
  sys/memory:
    pattern: "sys/memory|s/mem"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    summary_model: "qwen3-vl-2b-thinking"
    ctx_len: 64000  # Override model default (128000)
    max_tokens: 8192

  sys/summary:
    pattern: "sys/summary|s/sym"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    summary_model: "qwen3-vl-2b-thinking"
    ctx_len: 64000  # Override model default (128000)
    max_tokens: 8192

  # ========== CODE ROUTES ==========
  
  code/junior:
    pattern: "code/junior|c/jr"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen2.5-7b-instruct"
    summary_model: "qwen2.5-3b-instruct"
    # Inherits ctx_len=8192, max_tokens=4096 from model config

  code/senior:
    pattern: "code/senior|c/sn"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    summary_model: "qwen2.5-7b-instruct"
    ctx_len: 16384  # Override model default (128000) for focused code review

  code/architect:
    pattern: "code/architect|c/arc"
    upstream_url: "http://arkai.local:1234/v1"
    main_model: "qwen3.5-35b-a3b@q3_k_s"
    summary_model: "qwen3-vl-2b-thinking"
    ctx_len: 64000  # Override model default (128000) for system design
